<script>
  (function() {
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    if (!themeMeta) return;

    const lightColor = '#f8f9fb';
    const darkColor = '#0f0f0f';

    function setThemeColor() {
      if (document.documentElement.classList.contains('dark')) {
        themeMeta.setAttribute('content', darkColor);
      } else {
        themeMeta.setAttribute('content', lightColor);
      }
    }

    // Set initial color
    setThemeColor();

    // Observe for future changes to the class attribute of the html element
    const observer = new MutationObserver(setThemeColor);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['class']
    });
  })();
</script>
